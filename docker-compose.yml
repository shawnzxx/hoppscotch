services:
  hoppscotch-db:
    image: postgres:15
    container_name: hoppscotch-db
    restart: always
    user: postgres
    environment:
      POSTGRES_USER: postman
      POSTGRES_PASSWORD: postman
      POSTGRES_DB: hoppscotch
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "sh -c 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}'",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - hoppscotch-db:/var/lib/postgresql/data
  hoppscotch-aio:
    image: hoppscotch/hoppscotch
    container_name: hoppscotch-aio
    healthcheck:
      test: ["CMD", "/bin/sh", "/healthcheck.sh"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
    restart: always
    user: root
    env_file:
      - ./.env
    environment:
      npm_config_registry: "https://nexus.in.spdigital.sg/repository/npm-proxy/"
      NODE_EXTRA_CA_CERTS: "/usr/local/share/ca-certificates/zscaler-ca.crt"
      # Proxy passthrough (optional): allows Prisma/Node to reach external HTTPS via your corporate proxy
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-hoppscotch-db,localhost,127.0.0.1}
      http_proxy: ${http_proxy:-}
      https_proxy: ${https_proxy:-}
      no_proxy: ${no_proxy:-hoppscotch-db,localhost,127.0.0.1}

      # Prisma: some corporate filters block the checksum endpoint with 403; allow startup to continue
      PRISMA_ENGINES_CHECKSUM_IGNORE_MISSING: "true"
      # Optional: point Prisma engine downloads to an internal mirror (recommended when binaries.prisma.sh is blocked)
      PRISMA_ENGINES_MIRROR: ${PRISMA_ENGINES_MIRROR:-}
      PRISMA_BINARY_MIRROR: ${PRISMA_BINARY_MIRROR:-}
    volumes:
      # 挂载本地的 CA 证书
      - ./zscaler-ca.crt:/usr/local/share/ca-certificates/zscaler-ca.crt:ro
      # Optional: pre-downloaded Prisma engines (avoid downloading from binaries.prisma.sh)
      - ./prisma-engines:/opt/prisma-engines:ro
    depends_on:
      hoppscotch-db:
        condition: service_healthy
    ports:
      - "3000:3000"
      - "3100:3100"
      - "3170:3170"
    command: >
      sh -c "update-ca-certificates && pnpx prisma migrate deploy && node /usr/src/app/aio_run.mjs"

  # Optional: a lightweight proxy server to bypass browser CORS restrictions.
  # Configure Hoppscotch UI: Settings -> Interceptor -> Proxy.
  proxyscotch:
    image: hoppscotch/proxyscotch:v0.1.4
    container_name: proxyscotch
    restart: unless-stopped
    volumes:
      # 挂载 Zscaler CA（与 hoppscotch-aio 用同一个文件）
      - ./zscaler-ca.crt:/usr/local/share/ca-certificates/zscaler-ca.crt:ro
    environment:
      # Go 运行时官方环境变量，直接读取指定的 CA 文件
      # 不调用任何系统命令，不需要 apk，不需要 update-ca-certificates
      SSL_CERT_FILE: /usr/local/share/ca-certificates/zscaler-ca.crt
      # Leave empty to disable access token validation.
      PROXYSCOTCH_TOKEN: ${PROXYSCOTCH_TOKEN:-}
      # Comma-separated list of allowed browser origins.
      PROXYSCOTCH_ALLOWED_ORIGINS: ${PROXYSCOTCH_ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
      - "9159:9159"
volumes:
  hoppscotch-db: